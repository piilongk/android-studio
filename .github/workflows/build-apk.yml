name: Build Android Agent APK

on:
  push:
    branches:
      - '**' # Chạy khi push lên bất kỳ branch nào

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install Gradle and Generate Wrapper
        run: |
          # Tải bản Gradle chính thức để sinh Wrapper
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH=$PWD/gradle-8.2/bin:$PATH
          
          # Di chuyển vào thư mục agent và sinh Wrapper
          cd android-agent
          gradle wrapper

      - name: Grant Execute Permission for Gradlew
        run: |
          cd android-agent
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd android-agent
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-agent-apk
          path: android-agent/app/build/outputs/apk/debug/app-debug.apk
